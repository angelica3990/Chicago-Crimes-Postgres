services:
  db:
    image: msds420/postgres-14:multi
    restart: always
    container_name: chicago_crimes
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
      PGDATA: chicago_crimes_data
    networks:
      - psql
    ports:
      - "5437:5432"  # Expose PostgreSQL port
networks:
  psql:
    driver: bridge